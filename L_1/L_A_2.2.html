<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Document</title>
    <style>
        p::first-line
        {
            color: blue;
            font-size: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <br>
    <p>
        Cascading Style Sheets (CSS) is used to style HTML documents.
        It allows developers to control colors, fonts, spacing, layouts,
        and many visual effects on web pages.
    </p>

</br>
</body>
</html>
