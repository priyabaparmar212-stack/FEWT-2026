<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     div
    {
        height: 100px;
        width: 100px ;
        background-color: red;
        position: absolute;
        animation-name: changethecolor;
        animation-duration: 5s;
    }

        @keyframes changethecolor
        {
           0%
           {
             left : 0px;
             top : 0px;
           } 
           25%
           {
            left :200px;
            top:0px;
           }
           50%
           {
            left:200px;
            top:200px;
           }
           75%
           {
            left:0px;
            top:200px;
           }
           100%
           {
            left:0px;
            top0px;
           }


        }
    }
    </style>
    
       
</head>
<body>
   
    <div></div>
</body>
</html>
